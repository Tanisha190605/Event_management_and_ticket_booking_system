<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Management & Ticket Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                dark: '#2d1b64', // Deep purple base
                primary: '#4c1d95', // Vivid purple center
                secondary: '#38bdf8', // Cyan/blue edges
                pink: '#ec4899', // Pink script text
                teal: '#2dd4bf', // Teal script text
                navy: '#1e1b4b', // Darkest text color
              }
            },
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
              script: ['Caveat', 'cursive'],
            },
          }
        }
      }
    </script>
    <style type="text/tailwindcss">
      @layer utilities {
        .glass-panel {
          @apply bg-white/10 backdrop-blur-md border border-white/20 shadow-xl;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
